<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EduGalp</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d1117;--card:#161b22;--green:#3ddc84;--white:#f0f6fc}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
#shell{width:100vw;max-width:430px;height:100dvh;max-height:780px;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── HOME ──────────────────────────── */
#home{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:40px 22px 30px}
.home-eyebrow{font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;letter-spacing:3px;color:var(--green);text-transform:uppercase;margin-bottom:14px}
.home-h1{font-family:'Nunito',sans-serif;font-size:38px;font-weight:900;color:var(--white);line-height:1.1;margin-bottom:8px}
.home-sub{font-size:14px;color:#8b949e;line-height:1.6;margin-bottom:32px}
.mod-grid{display:flex;flex-direction:column;gap:12px}
.mc{border-radius:20px;padding:20px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform .15s,filter .15s;position:relative;overflow:hidden}
.mc:active{transform:scale(.97)}
.mc .mico{font-size:32px;animation:bob 3s ease-in-out infinite}
.mc-text h3{font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;margin-bottom:2px}
.mc-text p{font-size:12px;opacity:.7;line-height:1.3}
.mc .mchev{margin-left:auto;font-size:20px;opacity:.5;flex-shrink:0}
.mc.done .mchev{color:var(--green);opacity:1}
.mc.w{background:linear-gradient(130deg,#1e6eb5,#0e4a8a);color:#dbeafe}
.mc.e{background:linear-gradient(130deg,#c47f0a,#8a5500);color:#fef3c7}
.mc.r{background:linear-gradient(130deg,#1a7a3c,#0d5228);color:#d1fae5}
.mc.g{background:linear-gradient(130deg,#7c2db5,#4e1880);color:#f3e8ff}

/* ── PLAYER ────────────────────────── */
#player{display:none;flex:1;flex-direction:column;overflow:hidden}
#player.on{display:flex}
.pbar{display:flex;align-items:center;gap:10px;padding:14px 18px 10px;flex-shrink:0}
.pbk{background:none;border:none;font-size:22px;cursor:pointer;color:var(--white);padding:0;line-height:1}
.ptitle{font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:var(--white);flex:1}
.pdots{display:flex;gap:5px}
.pdot{height:4px;border-radius:2px;background:rgba(255,255,255,0.18);transition:.35s;flex:1;min-width:12px}
.pdot.done{background:var(--green)}
.pdot.cur{background:#fff}

/* ── STORY STAGE ────────────────────── */
.stage{flex:1;overflow:hidden;position:relative;display:flex;align-items:stretch}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px 18px 0;gap:10px;opacity:0;transform:translateY(30px);transition:opacity .4s,transform .4s;pointer-events:none;overflow-y:auto}
.scene.in{opacity:1;transform:translateY(0);pointer-events:all}
.scene.out{opacity:0;transform:translateY(-30px)}

/* Scene elements — start hidden, animate in via JS */
.se{opacity:0;transform:translateY(20px);transition:opacity .4s ease, transform .4s ease}
.se.show{opacity:1;transform:translateY(0)}

/* BIG ICON HERO */
.big-icon{font-size:80px;text-align:center;line-height:1}
.hero-label{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:var(--white);text-align:center;line-height:1.2}
.hero-sub{font-size:14px;color:#8b949e;text-align:center;line-height:1.6;max-width:280px}

/* STAT BUBBLE */
.bubble-row{display:flex;gap:10px;width:100%;justify-content:center;flex-wrap:wrap}
.bubble{border-radius:18px;padding:14px 16px;text-align:center;flex:1;min-width:90px;max-width:130px}
.bubble .bnum{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;line-height:1;margin-bottom:2px}
.bubble .blbl{font-size:11px;font-weight:600;line-height:1.3;opacity:.8}
.bubble.bl{background:#1e3a5f;color:#93c5fd}.bubble.bl .bnum{color:#60a5fa}
.bubble.rd{background:#4a1515;color:#fca5a5}.bubble.rd .bnum{color:#f87171}
.bubble.gn{background:#14412a;color:#6ee7b7}.bubble.gn .bnum{color:#34d399}
.bubble.am{background:#4a2d00;color:#fcd34d}.bubble.am .bnum{color:#fbbf24}
.bubble.pu{background:#2d1a4a;color:#c4b5fd}.bubble.pu .bnum{color:#a78bfa}
.bubble.wh{background:#1c2128;color:#e6edf3}.bubble.wh .bnum{color:var(--green)}

/* FACT PILL */
.fact-pill{width:100%;border-radius:16px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.fact-pill .fp-ico{font-size:26px;flex-shrink:0}
.fact-pill .fp-txt strong{display:block;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:var(--white);margin-bottom:2px}
.fact-pill .fp-txt span{font-size:12px;color:#8b949e;line-height:1.5}
.fact-pill.bl{background:#0d1f35;border:1px solid #1e3a5f}
.fact-pill.gn{background:#0a2419;border:1px solid #14412a}
.fact-pill.am{background:#1e1400;border:1px solid #4a2d00}
.fact-pill.rd{background:#1e0a0a;border:1px solid #4a1515}
.fact-pill.pu{background:#12091e;border:1px solid #2d1a4a}

/* VERSUS */
.vs-wrap{width:100%;display:grid;grid-template-columns:1fr 32px 1fr;gap:6px;align-items:start}
.vs-col{border-radius:14px;padding:12px}
.vs-col h4{font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;margin-bottom:8px}
.vs-col ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.vs-col ul li{font-size:11px;line-height:1.35;display:flex;gap:5px}
.vs-bad{background:#1e0a0a;border:1px solid #4a1515}
.vs-good{background:#0a2419;border:1px solid #14412a}
.vs-mid{display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;color:#484f58;padding-top:28px}

/* STEPS */
.steps-wrap{width:100%;display:flex;flex-direction:column}
.srow{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.srow:last-child{border:none}
.srow .snum{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;flex-shrink:0;color:#0d1117;margin-top:1px}
.srow .stxt strong{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--white);display:block;margin-bottom:2px}
.srow .stxt span{font-size:12px;color:#8b949e;line-height:1.4}

/* CHIP GRID */
.chips{width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.chip{border-radius:14px;padding:12px 8px;text-align:center;border:1px solid rgba(255,255,255,.07)}
.chip .cico{font-size:22px;margin-bottom:5px}
.chip h4{font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;margin-bottom:2px}
.chip p{font-size:10px;color:#8b949e;line-height:1.3}

/* TRIO */
.trio{width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ti{border-radius:14px;padding:13px 10px;text-align:center}
.ti .tico{font-size:26px;margin-bottom:5px}
.ti h4{font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;margin-bottom:2px}
.ti p{font-size:10px;opacity:.65;line-height:1.3}

/* QUOTE */
.qt{width:100%;border-radius:14px;padding:14px 16px;font-size:13px;font-style:italic;color:#8b949e;line-height:1.7;border-left:3px solid var(--green)}

/* ── NARRATION BAR ──────────────────── */
.nar-bar{flex-shrink:0;margin:8px 18px 6px;border-radius:16px;background:#161b22;border:1px solid #30363d;display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;transition:border-color .2s}
.nar-bar:active{border-color:var(--green)}
.nar-bar.playing{border-color:var(--green)}
.nar-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#21262d}
.nar-ico svg{width:16px;height:16px;fill:var(--green)}
.nar-meta{flex:1;min-width:0}
.nar-lbl{font-size:10px;font-weight:700;color:#484f58;text-transform:uppercase;letter-spacing:.8px}
.nar-status{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nar-wave{display:flex;align-items:center;gap:2px;height:18px;flex-shrink:0}
.nar-wave.off{display:none}
.nw{display:block;width:3px;border-radius:2px;background:var(--green);animation:wv .7s ease-in-out infinite;transform-origin:bottom;height:4px}
.nw:nth-child(2){animation-delay:.1s;height:10px}
.nw:nth-child(3){animation-delay:.2s;height:16px}
.nw:nth-child(4){animation-delay:.15s;height:8px}
.nw:nth-child(5){animation-delay:.05s;height:13px}

/* ── NAV ────────────────────────────── */
.pnav{display:flex;gap:10px;padding:8px 18px 16px;flex-shrink:0}
.nb{flex:1;padding:14px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;border:none;transition:.15s}
.nb.p{background:var(--green);color:#0d1117}
.nb.p:active{filter:brightness(.9)}
.nb.s{background:#21262d;color:var(--white);border:1px solid #30363d}
.nb.s:active{background:#2d333b}
.nb:disabled{opacity:.3;cursor:not-allowed}

/* ── DONE ───────────────────────────── */
.done-scene{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 24px;text-align:center}
.done-ring{width:80px;height:80px;border-radius:50%;background:#14412a;display:flex;align-items:center;justify-content:center;font-size:40px;animation:pop .6s cubic-bezier(.175,.885,.32,1.275) both}
.done-scene h2{font-family:'Nunito',sans-serif;font-size:24px;font-weight:900;color:var(--white)}
.done-scene p{font-size:14px;color:#8b949e;line-height:1.6;max-width:260px}
.done-btn{background:var(--green);color:#0d1117;border:none;padding:14px 32px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;cursor:pointer;font-weight:900;width:100%}

/* ── ANIMATIONS ─────────────────────── */
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes wv{0%,100%{height:3px}50%{height:16px}}
</style>
</head>
<body>
<div id="shell">

<!-- HOME -->
<div id="home">
  <div class="home-eyebrow">EduGalp · GG25</div>
  <div class="home-h1">Aprende.<br>Explora.<br>Age.</div>
  <div class="home-sub">4 módulos de sustentabilidade — narrados e animados</div>
  <div class="mod-grid" id="modGrid"></div>
</div>

<!-- PLAYER -->
<div id="player">
  <div class="pbar">
    <button class="pbk" onclick="goHome()">←</button>
    <span class="ptitle" id="ptitle"></span>
    <div class="pdots" id="pdots"></div>
  </div>

  <div class="stage" id="stage"></div>

  <div class="nar-bar playing" id="narBar" onclick="toggleNar()">
    <div class="nar-ico" id="narIco">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </div>
    <div class="nar-meta">
      <div class="nar-lbl">Narração</div>
      <div class="nar-status" id="narStatus">Toca para ouvir 🎧</div>
    </div>
    <div class="nar-wave off" id="narWave">
      <span class="nw"></span><span class="nw"></span><span class="nw"></span><span class="nw"></span><span class="nw"></span>
    </div>
  </div>

  <div class="pnav">
    <button class="nb s" id="prevBtn" onclick="nav(-1)">← Anterior</button>
    <button class="nb p" id="nextBtn" onclick="nav(1)">Próximo →</button>
  </div>
</div>

</div>

  nar:'Cinco hábitos simples e poupas centenas de litros por semana. Duche de 5 minutos. Torneira fechada ao escovar os dentes. Loiça com bacia. Rega de manhã. Reporta fugas.',

  nar:'Do outro lado, estão o petróleo, o carvão e o gás natural. Finitos e poluentes. Libertam dióxido de carbono que causa o aquecimento global, secas e cheias.',

// ─── STATE ────────────────────────────────────────────────────────────────────
let cM=null, cS=0, done=new Set(), speaking=false;
let timers=[], animTimers=[];
const sy=window.speechSynthesis;

// ─── VOICE ───────────────────────────────────────────────────────────────────
function getPTV(){
  const v=sy.getVoices();
  return v.find(x=>x.lang==='pt-PT')||v.find(x=>x.lang.startsWith('pt'))||null;
}
// Preload voices
if(sy.onvoiceschanged!==undefined) sy.onvoiceschanged=()=>getPTV();
getPTV();

function speak(text, onWord){
  if(!sy) return;
  sy.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const v = getPTV();
  if(v) u.voice=v;
  u.lang='pt-PT'; u.rate=0.88; u.pitch=1;
  u.onstart=()=>{ speaking=true; updNar(); };
  u.onend=u.onerror=()=>{ speaking=false; updNar(); };
  sy.speak(u);
}

function toggleNar(){
  if(speaking){ sy.cancel(); speaking=false; updNar(); clearAnimTimers(); return; }
  startSceneNar();
}

function startSceneNar(){
  if(cM===null) return;
  const sc = MODULES[cM].scenes[cS];
  clearAnimTimers();
  // schedule element reveals
  sc.timings.forEach((t,i)=>{
    const tid=setTimeout(()=>revealElement(i), t*1000);
    animTimers.push(tid);
  });
  speak(sc.nar);
}

function clearAnimTimers(){
  animTimers.forEach(t=>clearTimeout(t));
  animTimers=[];
}

function revealElement(idx){
  const scene=document.querySelector('.scene.in');
  if(!scene) return;
  const els=scene.querySelectorAll('.se');
  if(els[idx]) els[idx].classList.add('show');
}

function revealAll(){
  const scene=document.querySelector('.scene.in');
  if(!scene) return;
  scene.querySelectorAll('.se').forEach(el=>el.classList.add('show'));
}

function updNar(){
  const st=document.getElementById('narStatus');
  const wv=document.getElementById('narWave');
  const ic=document.getElementById('narIco');
  const nb=document.getElementById('narBar');
  if(speaking){
    if(st) st.textContent='A narrar... toca para pausar';
    if(wv) wv.classList.remove('off');
    if(nb) nb.classList.add('playing');
    if(ic) ic.innerHTML='<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#3ddc84"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
  } else {
    if(st) st.textContent='Toca para ouvir 🎧';
    if(wv) wv.classList.add('off');
    if(nb) nb.classList.remove('playing');
    if(ic) ic.innerHTML='<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#3ddc84"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
  }
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function renderHome(){
  document.getElementById('modGrid').innerHTML=MODULES.map((m,i)=>`
    <div class="mc ${m.cls}${done.has(i)?' done':''}" onclick="startMod(${i})">
      <div class="mico">${m.title.split(' ')[0]}</div>
      <div class="mc-text"><h3>${m.title.substring(m.title.indexOf(' ')+1)}</h3><p>${m.sub}</p></div>
      <div class="mchev">${done.has(i)?'✓':'›'}</div>
    </div>`).join('');
}

function goHome(){
  sy.cancel(); speaking=false; clearAnimTimers();
  document.getElementById('home').style.display='flex';
  document.getElementById('player').classList.remove('on');
  renderHome();
}

// ─── PLAYER ───────────────────────────────────────────────────────────────────
function startMod(i){
  sy.cancel(); speaking=false; clearAnimTimers();
  cM=i; cS=0;
  document.getElementById('home').style.display='none';
  document.getElementById('player').classList.add('on');
  document.getElementById('ptitle').textContent=MODULES[i].title;
  renderScene('r');
  updDots();
}

function renderScene(dir){
  const stage=document.getElementById('stage');
  const old=stage.querySelector('.scene.in');
  if(old){ old.classList.remove('in'); old.classList.add('out'); setTimeout(()=>old.remove(),350); }
  const m=MODULES[cM], sc=m.scenes[cS];
  const el=document.createElement('div');
  el.className='scene';
  el.innerHTML=sc.html;
  stage.appendChild(el);
  // slight delay for DOM
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.classList.add('in');
    // auto-start narration — will work after first user gesture has been made (they tapped a module card)
    setTimeout(()=>startSceneNar(), 200);
  }));
  document.getElementById('prevBtn').disabled=false;
  document.getElementById('nextBtn').textContent=cS===m.scenes.length-1?'Concluir ✓':'Próximo →';
  updDots();
}

function updDots(){
  const t=MODULES[cM].scenes.length;
  document.getElementById('pdots').innerHTML=Array.from({length:t},(_,i)=>
    `<div class="pdot ${i<cS?'done':i===cS?'cur':''}" style="min-width:${Math.max(12,48/t)}px"></div>`
  ).join('');
}

function nav(d){
  sy.cancel(); speaking=false; clearAnimTimers();
  const t=MODULES[cM].scenes.length;
  if(d===1&&cS===t-1){ done.add(cM); showDone(); return; }
  if(d===-1&&cS===0){ goHome(); return; }
  cS=Math.max(0,Math.min(t-1,cS+d));
  renderScene(d===1?'r':'l');
}

function showDone(){
  sy.cancel(); speaking=false; clearAnimTimers();
  const stage=document.getElementById('stage');
  const old=stage.querySelector('.scene.in');
  if(old) old.remove();
  const el=document.createElement('div');
  el.className='scene in';
  el.innerHTML=`<div class="done-scene"><div class="done-ring">🎉</div><h2>Módulo concluído!</h2><p>Muito bem! Tens o conhecimento para fazer a diferença em Moçambique.</p><button class="done-btn" onclick="goHome()">← Ver todos os módulos</button></div>`;
  stage.appendChild(el);
  document.getElementById('prevBtn').disabled=true;
  document.getElementById('nextBtn').disabled=true;
  speak('Parabéns! Completaste este módulo. Agora tens o conhecimento para fazer a diferença.');
}

renderHome();
</script>
